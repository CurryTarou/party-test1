<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡互動實驗</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #111; color: white; }
        .box { border: 2px solid #444; padding: 20px; margin: 20px auto; max-width: 300px; border-radius: 10px; }
        button { font-size: 30px; padding: 10px 40px; margin: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="box">
        <h2>大螢幕數據</h2>
        <h1 id="timer">--</h1>
        <p>O: <span id="y">0</span> | X: <span id="n">0</span></p>
    </div>

    <div class="box" style="background: #222;">
        <h2>手機投票區</h2>
        <button onclick="vote('yes')" style="background: green; color: white;">O</button>
        <button onclick="vote('no')" style="background: red; color: white;">X</button>
    </div>

    <script>
        // 這是你的資料庫網址，加上 .json 是為了使用 REST API 模式
        const DB_URL = "https://firebaseio.com";

        // 1. 每秒抓一次資料 (模擬即時同步)
        async function fetchData() {
            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                if (data) {
                    document.getElementById('y').innerText = data.yes || 0;
                    document.getElementById('n').innerText = data.no || 0;
                    document.getElementById('timer').innerText = data.timer || 0;
                }
            } catch (e) { console.error("同步失敗"); }
        }
        setInterval(fetchData, 1000);

        // 2. 投票功能 (直接送出最新的數值)
        async function vote(type) {
            // 先抓目前的數值
            const res = await fetch(DB_URL);
            const data = await res.json() || { yes: 0, no: 0, timer: 10 };
            
            // 增加數值
            data[type] = (data[type] || 0) + 1;

            // 存回去 (使用 PATCH)
            await fetch(DB_URL, {
                method: 'PATCH',
                body: JSON.stringify(data)
            });
        }

        // 3. 倒數計時 (由主機端分頁負責)
        setInterval(async () => {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if (data && data.timer > 0) {
                await fetch(DB_URL, {
                    method: 'PATCH',
                    body: JSON.stringify({ timer: data.timer - 1 })
                });
            }
        }, 2000); // 稍微慢一點點避免頻繁衝突
    </script>
</body>
</html>
