<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>最簡連動測試</title>
</head>
<body style="text-align:center; font-size:30px;">
    
    <!-- 顯示區 -->
    <p>目前的數字：<b id="num">載入中...</b></p>
    
    <!-- 按鈕區 -->
    <button onclick="add()" style="font-size:40px;">點我 +1</button>

    <script>
        // 這是你的資料庫網址
        const url = "https://firebaseio.com";

        // 1. 每秒從雲端抓一次數字
        setInterval(async () => {
            const res = await fetch(url);
            const data = await res.json();
            document.getElementById('num').innerText = data || 0;
        }, 1000);

        // 2. 點擊按鈕，把雲端的數字 +1
        async function add() {
            const res = await fetch(url);
            const current = await res.json() || 0;
            await fetch(url, {
                method: 'PUT',
                body: JSON.stringify(current + 1)
            });
        }
    </script>
</body>
</html>
