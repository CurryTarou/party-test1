<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動派對遊戲 - 終極救援版</title>
    <!-- 注意：這裡原本是引用外部 JS，現在我把它們移除，改用下方的內嵌腳本 -->
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; padding: 20px; }
        .card { background: #333; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .timer { font-size: 80px; color: #ffeb3b; font-weight: bold; margin: 10px 0; }
        .btn { font-size: 30px; padding: 20px 50px; margin: 10px; border: none; border-radius: 12px; color: white; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.9); }
        .btn-yes { background: #4caf50; }
        .btn-no { background: #f44336; }
        #status { font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="status">正在初始化系統...</h2>
        <div class="timer" id="timer">--</div>
        <div style="font-size: 24px;">
            O: <span id="y" style="color:#4caf50">0</span> | 
            X: <span id="n" style="color:#f44336">0</span>
        </div>
        <br>
        <button onclick="resetGame()" style="background:#555; color:white; border:none; padding:5px 15px; border-radius:5px; cursor:pointer;">重置遊戲</button>
    </div>

    <div class="card" style="background: #444;">
        <h2>📱 手機投票區</h2>
        <button class="btn btn-yes" onclick="vote('yes')">投 O</button>
        <button class="btn btn-no" onclick="vote('no')">投 X</button>
    </div>

    <!-- 這是唯一的希望：使用模組化引入方式，避開 nosniff 檢查 -->
    <script type="module">
        // 我們改用較現代的 ESM 引入方式，這在 GitHub Pages 上通常有更高的成功率
        import { initializeApp } from "https://gstatic.com";
        import { getDatabase, ref, onValue, set, runTransaction } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyDEtKMoVe8hedbXZ8pWHU4VpPwfS6RDkUw",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "my-party-game-test-1"
        };

        let dbRef;

        try {
            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);
            dbRef = ref(db, 'quiz_live');
            document.getElementById('status').innerText = "✅ 系統已連線";

            // 監聽雲端數據
            onValue(dbRef, (snap) => {
                const data = snap.val() || { yes: 0, no: 0, timer: 10 };
                document.getElementById('y').innerText = data.yes || 0;
                document.getElementById('n').innerText = data.no || 0;
                document.getElementById('timer').innerText = data.timer || 0;
            });

            // 將功能掛載到 window 讓按鈕可以點擊
            window.vote = (choice) => {
                const choiceRef = ref(db, `quiz_live/${choice}`);
                runTransaction(choiceRef, (current) => (current || 0) + 1);
            };

            window.resetGame = () => {
                set(dbRef, { yes: 0, no: 0, timer: 15 });
            };

            // 倒數計時邏輯 (每秒同步一次)
            setInterval(() => {
                const timerRef = ref(db, 'quiz_live/timer');
                runTransaction(timerRef, (t) => (t > 0 ? t - 1 : 0));
            }, 1000);

        } catch (e) {
            document.getElementById('status').innerText = "❌ 錯誤: " + e.message;
        }
    </script>
</body>
</html>
