<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動派對遊戲測試</title>
    <!-- 使用 cdnjs 替代 gstatic，解決攔截問題 -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .timer { font-size: 50px; color: #ff5722; font-weight: bold; }
        .btn { font-size: 24px; padding: 15px 40px; margin: 10px; border: none; border-radius: 8px; color: white; cursor: pointer; }
        .btn-yes { background: #4caf50; }
        .btn-no { background: #f44336; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="status">正在連線至雲端...</h2>
        <div class="timer" id="timer">--</div>
        <div>O: <span id="y">0</span> | X: <span id="n">0</span></div>
        <br>
        <button onclick="resetGame()">重置遊戲</button>
    </div>

    <div class="card" style="background: #e3f2fd;">
        <h2>📱 手機投票區</h2>
        <button class="btn btn-yes" onclick="vote('yes')">投 O</button>
        <button class="btn btn-no" onclick="vote('no')">投 X</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDEtKMoVe8hedbXZ8pWHU4VpPwfS6RDkUw",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "my-party-game-test-1"
        };

        let db;

        // 等網頁跟 SDK 都載入完才執行
        window.onload = function() {
            if (typeof firebase !== 'undefined') {
                firebase.initializeApp(firebaseConfig);
                db = firebase.database().ref('quiz_live');
                document.getElementById('status').innerText = "✅ 連線成功";
                
                // 啟動監聽
                db.on('value', (snap) => {
                    const data = snap.val() || { yes: 0, no: 0, timer: 10 };
                    document.getElementById('y').innerText = data.yes || 0;
                    document.getElementById('n').innerText = data.no || 0;
                    document.getElementById('timer').innerText = data.timer || 0;
                });
            } else {
                document.getElementById('status').innerText = "❌ SDK 載入失敗 (CDN 被封鎖)";
            }
        };

        function vote(choice) {
            if (db) {
                db.child(choice).transaction(c => (c || 0) + 1);
            } else {
                alert("尚未連線，請稍後");
            }
        }

        function resetGame() {
            if (db) db.update({ yes: 0, no: 0, timer: 15 });
        }

        // 每秒同步一次時間
        setInterval(() => {
            if (db) {
                db.child('timer').transaction(t => (t > 0 ? t - 1 : 0));
            }
        }, 1000);
    </script>
</body>
</html>
