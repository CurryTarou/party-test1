<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動派對測試 - 最終相容版</title>
    
    <!-- 使用完全限定的網址加載 SDK，解決 nosniff 和 404 問題 -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; padding: 20px; }
        .card { background: #2d2d2d; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 500px; margin: 0 auto 20px; }
        .timer { font-size: 100px; color: #ffcc00; margin: 20px 0; font-weight: bold; }
        .stats { font-size: 24px; margin-bottom: 20px; }
        .btn-group { display: flex; justify-content: center; gap: 20px; }
        .btn { font-size: 40px; padding: 20px 60px; border: none; border-radius: 15px; color: white; cursor: pointer; transition: 0.1s; }
        .btn:active { transform: scale(0.9); }
        .btn-yes { background: #4caf50; }
        .btn-no { background: #f44336; }
        #status { font-size: 12px; color: #777; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🎮 遊戲統計中</h2>
        <div id="timer" class="timer">--</div>
        <div class="stats">
            O: <span id="y" style="color:#4caf50">0</span> | 
            X: <span id="n" style="color:#f44336">0</span>
        </div>
        <button onclick="resetGame()" style="background:#444; color:#ccc; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">重置計數與時間</button>
        <div id="status">正在檢查連線...</div>
    </div>

    <div class="card" style="background: #252525;">
        <h3>📱 點擊下方按鈕投票</h3>
        <div class="btn-group">
            <button class="btn btn-yes" onclick="vote('yes')">O</button>
            <button class="btn btn-no" onclick="vote('no')">X</button>
        </div>
    </div>

    <script>
        // 根據你提供的截圖填寫的配置
        const firebaseConfig = {
            apiKey: "AIzaSyDEtKMoVe8hedbXZ8pWHU4VpPwfS6RDkUw",
            authDomain: "my-party-game-test-1.firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "my-party-game-test-1",
            storageBucket: "my-party-game-test-1.firebasestorage.app",
            messagingSenderId: "911863395813",
            appId: "1:911863395813:web:7b50500a5d3dda59066b0c"
        };

        // 初始化 Firebase (使用 Compat 版本，語法最簡單)
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('quiz_v1');

        const statusEl = document.getElementById('status');
        const timerEl = document.getElementById('timer');
        const yesEl = document.getElementById('y');
        const noEl = document.getElementById('n');

        // 監聽雲端數據更新
        db.on('value', (snapshot) => {
            const data = snapshot.val() || { yes: 0, no: 0, timer: 15 };
            yesEl.innerText = data.yes || 0;
            noEl.innerText = data.no || 0;
            timerEl.innerText = data.timer || 0;
            statusEl.innerText = "✅ 雲端連線正常";
        }, (error) => {
            statusEl.innerText = "❌ 連線錯誤: " + error.message;
        });

        // 投票邏輯
        window.vote = function(type) {
            db.child(type).transaction(current => (current || 0) + 1);
        };

        // 重置邏輯
        window.resetGame = function() {
            db.set({ yes: 0, no: 0, timer: 15 });
        };

        // 倒數計時邏輯 (每秒自動減 1)
        setInterval(() => {
            db.child('timer').transaction(t => {
                if (t > 0) return t - 1;
                return 0;
            });
        }, 1000);
    </script>
</body>
</html>
