<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動派對遊戲測試</title>
    <!-- 引用 Firebase SDK -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .timer { font-size: 50px; color: #ff5722; font-weight: bold; }
        .btn { font-size: 24px; padding: 15px 40px; margin: 10px; border: none; border-radius: 8px; color: white; cursor: pointer; }
        .btn-yes { background: #4caf50; }
        .btn-no { background: #f44336; }
        .stats { font-size: 20px; color: #555; }
    </style>
</head>
<body>

    <div class="card">
        <h2>📺 大螢幕統計 (Host)</h2>
        <div class="timer" id="timer">--</div>
        <div class="stats">
            O: <span id="y">0</span> 人 | X: <span id="n">0</span> 人
        </div>
        <button onclick="resetGame()">重置數據</button>
    </div>

    <div class="card" style="background: #e3f2fd;">
        <h2>📱 手機投票區 (Player)</h2>
        <button class="btn btn-yes" onclick="vote('yes')">投 O</button>
        <button class="btn btn-no" onclick="vote('no')">投 X</button>
    </div>

    <script>
        // 這是你之前的 Config
        const firebaseConfig = {
            apiKey: "AIzaSyDEtKMoVe8hedbXZ8pWHU4VpPwfS6RDkUw",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "my-party-game-test-1",
            storageBucket: "my-party-game-test-1.firebasestorage.app",
            messagingSenderId: "911863395813",
            appId: "1:911863395813:web:7b50500a5d3dda59066b0c"
        };

        // 初始化
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('quiz_live');

        // 監聽雲端數據
        db.on('value', (snap) => {
            const data = snap.val() || { yes: 0, no: 0, timer: 10 };
            document.getElementById('y').innerText = data.yes || 0;
            document.getElementById('n').innerText = data.no || 0;
            document.getElementById('timer').innerText = data.timer || 0;
        });

        // 投票功能
        function vote(choice) {
            db.child(choice).transaction(c => (c || 0) + 1);
        }

        // 重置功能
        function resetGame() {
            db.set({ yes: 0, no: 0, timer: 15 });
        }

        // 模擬大螢幕自動倒數 (每秒同步到雲端)
        setInterval(() => {
            db.child('timer').transaction(t => {
                if (t > 0) return t - 1;
                return 0;
            });
        }, 1000);
    </script>
</body>
</html>
